<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>neezam</title>
  <meta name="description" content="утренние и вечерние азкары с счётчиком повторений" />
  <meta property="og:title" content="neezam" />
  <meta property="og:description" content="утренние и вечерние азкары с счётчиком повторений" />
  <meta property="og:type" content="website" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon.png" />
  <meta name="theme-color" content="#141211" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="neezam" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Scheherazade+New:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=27" />
  <link rel="stylesheet" href="glass.css?v=1" />
</head>
<body>

  <header>
    <div class="logo">
      <div class="logo-icon"><svg class="ico-svg" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M6 .278a.768.768 0 0 1 .08.858 7.208 7.208 0 0 0-.878 3.46c0 4.021 3.278 7.277 7.318 7.277.527 0 1.04-.055 1.533-.16a.787.787 0 0 1 .81.316.733.733 0 0 1-.031.893A8.349 8.349 0 0 1 8.344 16C3.734 16 0 12.286 0 7.71 0 4.266 2.114 1.312 5.124.06A.752.752 0 0 1 6 .278z"/></svg></div>
      <span class="logo-text">neezam</span>
    </div>
    <div class="header-right">
      <div class="tabs" role="tablist" aria-label="Время суток">
        <button class="tab active" data-tab="morning" role="tab" aria-selected="true" aria-controls="deck">утром</button>
        <button class="tab" data-tab="evening" role="tab" aria-selected="false" aria-controls="deck">вечером</button>
      </div>
      <div id="streak" class="streak" hidden title="дней подряд">
        <span class="streak-flame"><svg class="ico-svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.07-2.14-.22-4.05 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.15.43-2.29 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg></span><span id="streak-count">0</span>
      </div>
      <button id="settings-toggle" onclick="toggleSettings()" title="настройки" aria-label="Настройки" aria-expanded="false" aria-haspopup="true"><svg class="ico-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
    </div>
  </header>

  <div id="settings-panel" class="settings-panel" hidden role="dialog" aria-label="Настройки">
    <div class="settings-row">
      <span class="settings-label">размер арабского</span>
      <div class="settings-control">
        <button class="size-btn" onclick="changeArabicSize(-1)" aria-label="Уменьшить шрифт">A&minus;</button>
        <span id="arabic-size-val" class="size-val">100%</span>
        <button class="size-btn" onclick="changeArabicSize(1)" aria-label="Увеличить шрифт">A+</button>
      </div>
    </div>
    <div class="settings-row">
      <span class="settings-label">транслитерация</span>
      <button id="translit-toggle" class="switch" role="switch" aria-checked="true" onclick="toggleTranslit()" aria-label="Показывать транслитерацию">
        <span class="switch-knob"></span>
      </button>
    </div>
    <div class="settings-row">
      <span class="settings-label">время намазов</span>
      <button id="prayer-toggle" class="switch" role="switch" aria-checked="true" onclick="togglePrayerTimes()" aria-label="Показывать время намазов">
        <span class="switch-knob"></span>
      </button>
    </div>
  </div>

  <div id="progress-bar" class="progress-bar" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" hidden>
    <div class="progress-bar-inner">
      <div class="progress-bar-fill" id="progress-fill"></div>
    </div>
    <div class="progress-bar-text" id="progress-text"></div>
  </div>

  <div id="prayer-times" class="prayer-times">
    <div id="prayer-prompt" class="prayer-prompt">
      <button class="prayer-enable-btn" onclick="enablePrayerTimes()">
        <svg class="ico-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        время намазов
      </button>
    </div>
    <div id="prayer-content" hidden>
      <div class="prayer-header">
        <button class="prayer-loc-pill" id="prayer-loc-pill" onclick="enablePrayerTimes()" title="обновить местоположение">
          <svg class="ico-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          <span id="prayer-city"></span>
        </button>
        <div class="prayer-next" id="prayer-next" hidden></div>
      </div>
      <div class="prayer-times-row">
        <div class="prayer-item" data-prayer="fajr"><div class="prayer-name">фаджр</div><div class="prayer-time" id="pt-fajr">--:--</div></div>
        <div class="prayer-item" data-prayer="sunrise"><div class="prayer-name">восход</div><div class="prayer-time" id="pt-sunrise">--:--</div></div>
        <div class="prayer-item" data-prayer="dhuhr"><div class="prayer-name">зухр</div><div class="prayer-time" id="pt-dhuhr">--:--</div></div>
        <div class="prayer-item" data-prayer="asr"><div class="prayer-name">аср</div><div class="prayer-time" id="pt-asr">--:--</div></div>
        <div class="prayer-item" data-prayer="maghrib"><div class="prayer-name">магриб</div><div class="prayer-time" id="pt-maghrib">--:--</div></div>
        <div class="prayer-item" data-prayer="isha"><div class="prayer-name">иша</div><div class="prayer-time" id="pt-isha">--:--</div></div>
      </div>
    </div>
  </div>

  <div class="stage">
    <main id="deck" class="deck" role="tabpanel">
      <div id="deck-stack" class="deck-stack" data-stack="0"></div>
    </main>

    <div class="deck-nav">
      <button id="prev-btn" class="nav-btn" onclick="goPrev()" aria-label="Назад" disabled><svg class="ico-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m15 18-6-6 6-6"/></svg></button>
      <button id="next-btn" class="nav-btn" onclick="goNext()" aria-label="Дальше"><svg class="ico-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m9 18 6-6-6-6"/></svg></button>
    </div>
    <div id="deck-dots" class="deck-dots" aria-hidden="true"></div>
    <div class="swipe-hint" hidden>листайте свайпом или стрелками</div>
  </div>

  <div id="celebration" class="celebration" aria-hidden="true"></div>

  <div id="completion-screen" class="completion-screen" hidden aria-hidden="true" onclick="if(event.target===this)hideCompletion()">
    <div class="completion-card" role="dialog" aria-modal="true" aria-label="Все азкары выполнены">
      <div class="completion-check"><svg class="ico-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 6 9 17l-5-5"/></svg></div>
      <div class="completion-title">ма ша Аллах</div>
      <div class="completion-sub">все азкары выполнены</div>
      <div class="completion-streak" id="completion-streak" hidden></div>
      <button class="completion-close" onclick="hideCompletion()">закрыть</button>
    </div>
  </div>

  <footer>&copy;&nbsp;апекс&nbsp;2026</footer>

  <script src="data.js?v=7"></script>
  <script src="app.js?v=17"></script>
  <script src="prayer.js?v=2"></script>
  <script>
    if ('serviceWorker' in navigator && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
